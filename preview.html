<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Quién es él por defecto?</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
  padding: 30px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
button {
  margin: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.male { background: #cfe8ff; }
.female { background: #ffd6e7; }
.neutral { background: #e8e8e8; }
</style>
</head>
<body>

<div class="card">
  <h2>¿Quién es este personaje?</h2>
  <p id="character">El zorro de un cuento clásico aparece en el bosque observando al protagonista.</p>

  <button class="male" onclick="answer('masculino')">Él</button>
  <button class="female" onclick="answer('femenino')">Ella</button>
  <button class="neutral" onclick="answer('neutral')">No lo asigno</button>

  <p id="feedback"></p>
  <p id="counter"></p>
</div>

<script>
let total = 0;
let maleDefault = 0;

const characters = [
  "El zorro de un cuento clásico aparece en el bosque observando al protagonista.",
  "Una ballena aparece como figura central en la historia de un barco obsesionado con ella.",
  "Un lobo recorre el bosque en una fábula tradicional sin nombre ni descripción sexual explícita.",
  "Un cuervo observa desde una rama mientras ocurre una escena de advertencia."
];

let index = 0;

function nextCharacter() {
  index = (index + 1) % characters.length;
  document.getElementById("character").innerText = characters[index];
}

function answer(choice) {
  total++;

  // Simulamos sesgo cultural
  if (choice === "masculino") maleDefault++;

  let msg = "";

  if (choice === "masculino") {
    msg = "Respuesta común: masculino por defecto.";
  } else if (choice === "femenino") {
    msg = "Menos frecuente: asignación femenina.";
  } else {
    msg = "Evitas la asignación por defecto.";
  }

  document.getElementById("feedback").innerText = msg;

  document.getElementById("counter").innerText =
    `Decisiones: ${total} | Asignación masculina: ${maleDefault}`;

  setTimeout(nextCharacter, 1200);
}
</script>

</body>
</html>
